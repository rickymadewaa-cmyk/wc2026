<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');
:root {
  --bg:#0a0e1a; --surface:#131929; --card:#1a2235; --border:#252f45;
  --accent:#c8a84b; --accent2:#e8c96b; --green:#2ecc71; --red:#e74c3c;
  --blue:#3498db; --text:#e8ecf4; --muted:#7a8aaa; --pill:#252f45;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}

/* HEADER */
header{background:linear-gradient(135deg,#0a0e1a,#131929);border-bottom:1px solid var(--border);padding:16px 16px 12px;text-align:center;position:sticky;top:0;z-index:100}
.header-trophy{font-size:24px;line-height:1;margin-bottom:3px}
header h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent);line-height:1}
header p{color:var(--muted);font-size:10px;margin-top:2px;letter-spacing:1px;text-transform:uppercase}
.tz-badge{display:inline-block;background:var(--accent);color:#0a0e1a;font-weight:700;font-size:10px;padding:2px 8px;border-radius:20px;margin-top:4px;letter-spacing:1px}

/* STATS BAR */
.stats-bar{display:flex;padding:8px 16px;gap:8px;background:var(--surface);border-bottom:1px solid var(--border)}
.stat-item{display:flex;flex-direction:column;align-items:center;flex:1}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);line-height:1}
.stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}

/* NAV TABS */
.nav-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex-shrink:0;padding:10px 14px;font-size:12px;font-weight:600;color:var(--muted);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;font-family:'Inter',sans-serif;letter-spacing:.3px;transition:all .2s}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* SUB FILTERS */
.sub-filters{padding:8px 12px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--surface)}
.sub-filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#0a0e1a}

/* MAIN */
main{padding:10px 14px 80px}

/* DAY */
.day-section{margin-bottom:18px}
.day-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.day-label{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text);letter-spacing:1px}
.day-date{font-size:10px;color:var(--muted);background:var(--pill);padding:2px 7px;border-radius:10px}
.day-count{margin-left:auto;font-size:10px;color:var(--muted)}

/* MATCH CARD */
.match-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.match-card.completed{border-left:3px solid var(--green)}
.match-card.live{border-left:3px solid var(--red)}

.match-top{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:rgba(255,255,255,.03);border-bottom:1px solid var(--border);gap:4px}
.match-group-badge{font-size:9px;font-weight:700;color:var(--accent);background:rgba(200,168,75,.15);padding:2px 7px;border-radius:10px;letter-spacing:1px;flex-shrink:0}
.match-time-wib{font-size:11px;font-weight:700;color:var(--text);flex-shrink:0}
.match-status{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;flex-shrink:0}
.status-upcoming{background:rgba(122,138,170,.15);color:var(--muted)}
.status-completed{background:rgba(46,204,113,.15);color:var(--green)}
.status-live{background:rgba(231,76,60,.2);color:var(--red)}

.match-body{padding:10px;display:flex;align-items:center;gap:6px}
.team{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;text-align:center}
.team-flag{font-size:26px;line-height:1}
.team-name{font-size:11px;font-weight:600;color:var(--text);line-height:1.2}
.team-name.winner{color:var(--accent2)}
.rank-badge{font-size:9px;color:var(--muted);background:var(--pill);padding:1px 5px;border-radius:5px;font-weight:600}
.score-area{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:60px}
.score{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--text);letter-spacing:3px;line-height:1}
.score-vs{font-size:10px;color:var(--muted);font-weight:600}

.match-bottom{padding:4px 10px 6px;display:flex;align-items:center;gap:4px;border-top:1px solid rgba(255,255,255,.04);flex-wrap:wrap}
.venue-text{font-size:9px;color:var(--muted);flex:1}
.weather-badge{font-size:10px;color:var(--accent2)}
.upset-tag{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;background:rgba(231,76,60,.2);color:var(--red);letter-spacing:.3px}
.big-upset-tag{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;background:rgba(231,76,60,.35);color:#ff6b6b;letter-spacing:.3px}

/* SCORERS LINE */
.scorers-line{padding:4px 10px 6px;font-size:10px;color:var(--muted);border-top:1px solid rgba(255,255,255,.04);line-height:1.5}
.scorer-home{color:#c8a84b}
.scorer-away{color:#3498db}

/* EXPAND TOGGLE */
.expand-toggle{width:100%;padding:6px 10px;background:rgba(200,168,75,.06);border:none;border-top:1px solid var(--border);color:var(--accent);font-size:10px;font-weight:600;cursor:pointer;text-align:center;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .2s}
.expand-toggle:hover{background:rgba(200,168,75,.12)}
.expand-arrow{transition:transform .3s;display:inline-block;font-size:9px}
.expand-arrow.open{transform:rotate(180deg)}
.details-panel{display:none;padding:10px;border-top:1px solid var(--border);background:rgba(0,0,0,.2)}
.details-panel.open{display:block}

/* STATS */
.stat-row{display:flex;align-items:center;gap:5px;margin-bottom:6px;font-size:10px}
.stat-val-l{color:var(--accent2);font-weight:700;min-width:26px;text-align:right;font-size:11px}
.stat-val-r{color:#3498db;font-weight:700;min-width:26px;text-align:left;font-size:11px}
.stat-name{color:var(--muted);text-align:center;flex:1;font-size:9px;text-transform:uppercase;letter-spacing:.5px}
.stat-bar-wrap{flex:2;display:flex;height:3px;border-radius:3px;overflow:hidden;background:var(--border)}
.stat-bar-home{background:var(--accent);height:100%}
.stat-bar-away{background:#3498db;height:100%}
.stats-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.stats-legend{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-bottom:8px}
.stats-legend span{display:flex;align-items:center;gap:3px}
.legend-color{width:8px;height:3px;border-radius:2px}

/* PROB BAR */
.prob-section{margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.prob-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.prob-bar-wrap{display:flex;height:18px;border-radius:5px;overflow:hidden}
.prob-home{background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#0a0e1a}
.prob-draw{background:var(--muted);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--bg)}
.prob-away{background:#3498db;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.prob-labels{display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:var(--muted)}

/* SECTION DIVIDER */
.section-divider{display:flex;align-items:center;gap:6px;margin:12px 0 6px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* STANDINGS */
.standings-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:12px}
.standings-table th{padding:5px 6px;text-align:left;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--surface)}
.standings-table td{padding:6px;border-bottom:1px solid rgba(255,255,255,.04)}
.standings-table tr:last-child td{border-bottom:none}
.standings-table tr.qualify-direct td{background:rgba(46,204,113,.06)}
.standings-table tr.qualify-3rd td{background:rgba(52,152,219,.06)}
.standings-table .team-cell{display:flex;align-items:center;gap:6px}
.standings-table .team-flag-sm{font-size:16px}
.standings-table .team-name-sm{font-size:11px;font-weight:600}
.qualify-badge{font-size:8px;padding:1px 5px;border-radius:4px;font-weight:700;letter-spacing:.3px;margin-left:4px}
.q-direct{background:rgba(46,204,113,.2);color:var(--green)}
.q-3rd{background:rgba(52,152,219,.2);color:var(--blue)}
.q-out{background:rgba(231,76,60,.1);color:var(--muted)}
.standings-legend{display:flex;gap:10px;font-size:9px;color:var(--muted);margin-bottom:8px;flex-wrap:wrap}
.standings-legend span{display:flex;align-items:center;gap:4px}
.legend-sq{width:8px;height:8px;border-radius:2px}
.group-tabs-standing{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:8px}
.group-tabs-standing::-webkit-scrollbar{display:none}
.g-tab{flex-shrink:0;padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.g-tab.active{background:var(--accent);border-color:var(--accent);color:#0a0e1a}

/* LEADERBOARD */
.leaderboard-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;padding:10px;display:flex;align-items:center;gap:10px}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);min-width:28px;text-align:center;line-height:1}
.lb-rank.gold{color:#ffd700}
.lb-rank.silver{color:#c0c0c0}
.lb-rank.bronze{color:#cd7f32}
.lb-info{flex:1}
.lb-name{font-size:13px;font-weight:700;color:var(--text)}
.lb-team{font-size:10px;color:var(--muted);margin-top:1px}
.lb-count{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent2);line-height:1;text-align:right}
.lb-count-label{font-size:9px;color:var(--muted);text-align:right;text-transform:uppercase}
.lb-section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text);margin:16px 0 8px;display:flex;align-items:center;gap:8px}

/* BRACKET */
.bracket-stage { margin-bottom: 24px; }
.bracket-stage-title { font-family: "Bebas Neue", sans-serif; font-size: 20px; letter-spacing: 1px; color: var(--accent); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.bracket-stage-dates { font-size: 10px; color: var(--muted); font-family: "Inter", sans-serif; font-weight: 400; letter-spacing: 0; }
.bracket-match { background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
.bracket-match.completed { border-left: 3px solid var(--green); }
.bracket-match.upcoming { border-left: 3px solid var(--border); }
.bracket-match-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 10px; background: rgba(255,255,255,.03); border-bottom: 1px solid var(--border); font-size: 9px; color: var(--muted); }
.bracket-match-num { font-weight: 700; color: var(--accent); }
.bracket-teams { display: flex; flex-direction: column; }
.bracket-team { display: flex; align-items: center; gap: 8px; padding: 8px 10px; }
.bracket-team:first-child { border-bottom: 1px solid rgba(255,255,255,.04); }
.bracket-team-flag { font-size: 18px; line-height: 1; }
.bracket-team-name { flex: 1; font-size: 12px; font-weight: 600; color: var(--text); }
.bracket-team-name.tbd { color: var(--muted); font-style: italic; font-weight: 400; }
.bracket-team-name.winner { color: var(--accent2); }
.bracket-team-score { font-family: "Bebas Neue", sans-serif; font-size: 20px; color: var(--text); min-width: 20px; text-align: right; }
.bracket-team-score.winner { color: var(--accent2); }
.bracket-info { padding: 4px 10px 6px; font-size: 9px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }
.bracket-note { background: rgba(200,168,75,.08); border: 1px solid rgba(200,168,75,.2); border-radius: 8px; padding: 8px 10px; font-size: 10px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
.bracket-note b { color: var(--accent); }

/* SCROLL TOP */
.scroll-top{position:fixed;bottom:20px;right:14px;width:38px;height:38px;border-radius:50%;background:var(--accent);color:#0a0e1a;border:none;font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:200;box-shadow:0 4px 14px rgba(200,168,75,.4)}
.scroll-top.visible{display:flex}

/* LEGEND */
.legend{display:flex;gap:12px;padding:6px 14px;background:var(--surface);border-top:1px solid var(--border);font-size:9px;color:var(--muted);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:3px}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.no-results{text-align:center;padding:28px;color:var(--muted);font-size:12px}
</style>
</head>

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function statBar(home, away) {
  const t = parseFloat(home) + parseFloat(away);
  const hp = t > 0 ? (home/t*100).toFixed(0) : 50;
  const ap = 100 - hp;
  return '<div class="stat-bar-wrap" style="flex:3"><div class="stat-bar-home" style="width:' + hp + '%"></div><div class="stat-bar-away" style="width:' + ap + '%"></div></div>';
}

function renderDetails(m) {
  const hasS = m.stats !== undefined;
  const hasP = m.prob !== undefined;
  if (!hasS && !hasP) return '';
  let html = '';
  if (hasS) {
    const s = m.stats;
    html += '<div class="stats-legend"><span><span class="legend-color" style="background:var(--accent)"></span>' + m.home + '</span><span><span class="legend-color" style="background:#3498db"></span>' + m.away + '</span></div>';
    html += '<div class="stats-title">Match Stats</div>';
    html += '<div class="stat-row"><span class="stat-val-l">' + s.homePoss + '%</span>' + statBar(s.homePoss, s.awayPoss) + '<span class="stat-val-r">' + s.awayPoss + '%</span><span class="stat-name">Poss</span></div>';
    html += '<div class="stat-row"><span class="stat-val-l">' + s.homeShots + '</span>' + statBar(s.homeShots, s.awayShots) + '<span class="stat-val-r">' + s.awayShots + '</span><span class="stat-name">Shots</span></div>';
    html += '<div class="stat-row"><span class="stat-val-l">' + s.homeShotsOT + '</span>' + statBar(s.homeShotsOT, s.awayShotsOT) + '<span class="stat-val-r">' + s.awayShotsOT + '</span><span class="stat-name">On Target</span></div>';
    html += '<div class="stat-row"><span class="stat-val-l">' + s.homeXG + '</span>' + statBar(s.homeXG, s.awayXG) + '<span class="stat-val-r">' + s.awayXG + '</span><span class="stat-name">xG</span></div>';
  }
  if (hasP) {
    const p = m.prob;
    html += '<div class="prob-section"><div class="prob-title">Win Probability</div>';
    html += '<div class="prob-bar-wrap"><div class="prob-home" style="width:' + p.home + '%">' + p.home + '%</div><div class="prob-draw" style="width:' + p.draw + '%">' + p.draw + '%</div><div class="prob-away" style="width:' + p.away + '%">' + p.away + '%</div></div>';
    html += '<div class="prob-labels"><span>' + m.home + '</span><span>Draw</span><span>' + m.away + '</span></div></div>';
  }
  return '<button class="expand-toggle" onclick="toggleDet(' + m.id + ')"><span>' + (hasS ? '📊 Stats' : '') + (hasS && hasP ? ' · ' : '') + (hasP ? '🎯 Prob' : '') + '</span><span class="expand-arrow" id="ea-' + m.id + '">▼</span></button><div class="details-panel" id="dp-' + m.id + '">' + html + '</div>';
}

function toggleDet(id) {
  const p = document.getElementById('dp-' + id);
  const a = document.getElementById('ea-' + id);
  if (!p) return;
  const isOpen = p.classList.toggle('open');
  if (a) a.classList.toggle('open', isOpen);
  if (isOpen) openDetails.add(id); else openDetails.delete(id);
}

function renderCard(m) {
  const isComp = m.status === 'completed';
  const isLive = m.status === 'live';
  const homeWin = m.winner === 'home';
  const awayWin = m.winner === 'away';
  const isDraw  = m.winner === 'draw';
  const statusLabel = isComp ? 'FT' : isLive ? '🔴 LIVE' : m.wibTime;
  const statusCls   = isComp ? 'status-completed' : isLive ? 'status-live' : 'status-upcoming';
  const cardCls     = isComp ? 'completed' : isLive ? 'live' : '';
  const scoreHTML   = isComp || isLive ? '<div class="score">' + m.homeScore + ' - ' + m.awayScore + '</div>' : '<div class="score-vs">VS</div>';
  const rankH = m.homeRank ? '<div class="rank-badge">#' + m.homeRank + '</div>' : '';
  const rankA = m.awayRank ? '<div class="rank-badge">#' + m.awayRank + '</div>' : '';
  const wxBadge = m.weather ? '<span class="weather-badge">' + m.weather + ' ' + m.tempC + '°C</span>' : '';

  // Upset detection
  let upsetHtml = '';
  if (isComp && m.prob) {
    const rd = Math.abs((m.homeRank||99)-(m.awayRank||99));
    if (homeWin && m.prob.home < 35) upsetHtml = rd > 20 ? '<span class="big-upset-tag">🚨 Big Upset!</span>' : '<span class="upset-tag">⚡ Upset</span>';
    else if (awayWin && m.prob.away < 35) upsetHtml = rd > 20 ? '<span class="big-upset-tag">🚨 Big Upset!</span>' : '<span class="upset-tag">⚡ Upset</span>';
    else if (isDraw && m.prob.home > 58) upsetHtml = '<span class="upset-tag">⚡ Upset</span>';
    else if (isDraw && m.prob.away > 58) upsetHtml = '<span class="upset-tag">⚡ Upset</span>';
  }

  // Scorers line
  let scorersLine = '';
  if (isComp && (m.homeScorers || m.awayScorers)) {
    const hs = (m.homeScorers||[]).map(s => s.name + ' ' + s.min + "'").join(', ');
    const as = (m.awayScorers||[]).map(s => s.name + ' ' + s.min + "'").join(', ');
    const parts = [];
    if (hs) parts.push('<span class="scorer-home">⚽ ' + hs + '</span>');
    if (as) parts.push('<span class="scorer-away">⚽ ' + as + '</span>');
    if (parts.length) scorersLine = '<div class="scorers-line">' + parts.join(' &nbsp;|&nbsp; ') + '</div>';
  }

  return '<div class="match-card ' + cardCls + '">' +
    '<div class="match-top"><span class="match-group-badge">GRP ' + m.group + '</span><span class="match-time-wib">' + m.wibTime + ' WIB</span><span class="match-status ' + statusCls + '">' + statusLabel + '</span></div>' +
    '<div class="match-body">' +
      '<div class="team"><div class="team-flag">' + m.homeFlag + '</div><div class="team-name' + (homeWin?' winner':'') + '">' + m.home + '</div>' + rankH + '</div>' +
      '<div class="score-area">' + scoreHTML + '</div>' +
      '<div class="team"><div class="team-flag">' + m.awayFlag + '</div><div class="team-name' + (awayWin?' winner':'') + '">' + m.away + '</div>' + rankA + '</div>' +
    '</div>' +
    scorersLine +
    '<div class="match-bottom"><span style="font-size:9px">📍</span><span class="venue-text">' + (m.venue||'TBC') + '</span>' +
      (isDraw && isComp ? '<span style="font-size:9px;color:var(--muted)">DRAW</span>' : '') +
      upsetHtml + wxBadge +
    '</div>' +
    renderDetails(m) +
  '</div>';
}

// ─── RENDER BY DATE ───────────────────────────────────────────────────────────
function renderByDate(list) {
  if (!list.length) return '<div class="no-results">No matches found</div>';
  const byDate = {};
  list.forEach(m => { const d = m.wibDate; if (!byDate[d]) byDate[d]=[]; byDate[d].push(m); });
  let html = '';
  Object.keys(byDate).sort().forEach(date => {
    const ms = byDate[date].sort((a,b) => a.wibTime.localeCompare(b.wibTime));
    html += '<div class="day-section"><div class="day-header"><span class="day-label">' + (dayNames[date]||date) + '</span><span class="day-date">' + (matchdays[date]||'') + '</span><span class="day-count">' + ms.length + ' match' + (ms.length>1?'es':'') + '</span></div>' + ms.map(renderCard).join('') + '</div>';
  });
  return html;
}

// ─── RENDER BY GROUP ─────────────────────────────────────────────────────────
function renderByGroup(grp) {
  const gm = matches.filter(m => m.group === grp).sort((a,b) => a.wibDate.localeCompare(b.wibDate)||a.wibTime.localeCompare(b.wibTime));
  const md1=gm.slice(0,2), md2=gm.slice(2,4), md3=gm.slice(4);
  let html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:4px 0;border-bottom:1px solid var(--border)"><span style="font-family:Bebas Neue,sans-serif;font-size:20px;letter-spacing:1px">Group ' + grp + '</span><span style="font-size:10px;color:var(--muted)">' + gm.filter(m=>m.status==='completed').length + '/' + gm.length + ' played</span></div>';
  if (md1.length) html += '<div class="section-divider">Matchday 1</div>' + md1.map(renderCard).join('');
  if (md2.length) html += '<div class="section-divider">Matchday 2</div>' + md2.map(renderCard).join('');
  if (md3.length) html += '<div class="section-divider">Matchday 3</div>' + md3.map(renderCard).join('');
  return html;
}

// ─── RENDER STANDINGS ─────────────────────────────────────────────────────────
function renderStandings() {
  const groups = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  let html = '<div class="group-tabs-standing" id="stGrpTabs">';
  ['A','B','C','D','E','F','G','H','I','J','K','L'].forEach(function(g){
    html += '<button class="g-tab' + (g===currentGroup?' active':'') + '" data-sg="' + g + '">' + g + '</button>';

  html += '<div class="standings-legend"><span><span class="legend-sq" style="background:rgba(46,204,113,.3)"></span>→ Round of 32</span><span><span class="legend-sq" style="background:rgba(52,152,219,.2)"></span>→ Best 3rd place</span></div>';
  html += '<table class="standings-table"><thead><tr><th>#</th><th>Team</th><th>GP</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>';
  rows.forEach((t, i) => {

  return html;
}

function setStandingGroup(g) {

// ─── RENDER SCORERS ───────────────────────────────────────────────────────────
function renderScorers() {
  const sorted = [...topScorers].sort((a,b) => b.goals-a.goals || b.assists-a.assists);

  sorted.forEach((p, i) => {

    html += '<div class="leaderboard-card"><div class="lb-rank ' + rankCls + '">' + (i+1) + '</div><div style="font-size:20px">' + p.flag + '</div><div class="lb-info"><div class="lb-name">' + p.name + '</div><div class="lb-team">' + p.team + (p.assists ? ' · ' + p.assists + ' ast' : '') + '</div></div><div><div class="lb-count">' + p.goals + '</div><div class="lb-count-label">Goals</div></div></div>';

}

// ─── RENDER ASSISTS ───────────────────────────────────────────────────────────

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render() {
  const main = document.getElementById('mainContent');
  const subBar = document.getElementById('subFiltersBar');
  if (currentTab === 'schedule') {
    subBar.style.display = 'flex';
    let list = matches;
    if (currentView === 'completed') list = matches.filter(m => m.status==='completed');
    if (currentView === 'upcoming')  list = matches.filter(m => m.status==='upcoming'||m.status==='live');
    if (currentView === 'group') { main.innerHTML = renderByGroup(currentGroup); }
    else { main.innerHTML = renderByDate(list); }
    // restore open details
    openDetails.forEach(id => {
      const p = document.getElementById('dp-'+id);
      const a = document.getElementById('ea-'+id);
      if (p) { p.classList.add('open'); if(a) a.classList.add('open'); }
    });
  } else if (currentTab === 'standings') {
    subBar.style.display = 'none';
    main.innerHTML = renderStandings();
    var stTabs = document.getElementById('stGrpTabs');
    if (stTabs) stTabs.addEventListener('click', function(e){
      var b = e.target.closest('button[data-sg]');
      if(b) setStandingGroup(b.getAttribute('data-sg'));
    });
  } else if (currentTab === 'scorers') {
    subBar.style.display = 'none';
    main.innerHTML = renderScorers();
  } else if (currentTab === 'assists') {
    subBar.style.display = 'none';
    main.innerHTML = renderAssists();
  } else if (currentTab === 'bracket') {
    subBar.style.display = 'none';
    main.innerHTML = renderBracket();
  }
}

function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setView(view, btn) {
  currentView = view;
  // handle group sub-tabs
  const existing = document.getElementById('groupSubTabs');
  if (view === 'group') {
    if (!existing) {
      const div = document.createElement('div');
      div.id = 'groupSubTabs';
      div.className = 'sub-filters';
      div.style.borderTop = '1px solid var(--border)';
      var glist = ['A','B','C','D','E','F','G','H','I','J','K','L'];
    glist.forEach(function(g){
      var btn = document.createElement('button');
      btn.className = 'filter-btn' + (g===currentGroup?' active':'');
      btn.textContent = g;
      btn.setAttribute('data-grp', g);
      div.appendChild(btn);
    });
    div.addEventListener('click', function(e){
      var b = e.target.closest('button[data-grp]');
      if(b) setGroup(b.getAttribute('data-grp'), b);
    });
      document.getElementById('subFiltersBar').after(div);
    } else { existing.style.display='flex'; }
  } else {
    if (existing) existing.style.display='none';
  }
  document.querySelectorAll('#subFiltersBar .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setGroup(g, btn) {
  currentGroup = g;
  document.querySelectorAll('#groupSubTabs .filter-btn').forEach(b => b.classList.toggle('active', b.textContent.trim()===g));
  render();
}

function slotLabel(slot) {
  if (thirdSlotDesc[slot]) return thirdSlotDesc[slot];
  if (slot.startsWith("W")) return "Winner M" + slot.slice(1);
  if (slot.startsWith("L")) return "Loser M" + slot.slice(1);
  if (slot.startsWith("1")) return "1st Group " + slot.slice(1);
  if (slot.startsWith("2")) return "2nd Group " + slot.slice(1);
  return slot;
}

}

function renderBracket() {
  var html = '<div class="bracket-note"><b>🏆 How teams qualify:</b> Top 2 from each of 12 groups (24 teams) + best 8 third-placed teams = 32 teams in the Round of 32. Third-place matchups only confirmed after Jun 28.</div>';
  var order = ['r32','r16','qf','sf','tp','final'];
  order.forEach(function(stage) {
    var info = stageNames[stage];
    html += '<div class="bracket-stage">';
    html += '<div class="bracket-stage-title">' + info.label + '<span class="bracket-stage-dates">' + info.dates + '</span></div>';
    bracketData[stage].forEach(function(m) { html += renderBracketMatch(m); });
    html += '</div>';
  });
  return html;
}


// ─── UPDATE MAIN RENDER ───────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  document.getElementById('scrollTopBtn').classList.toggle('visible', window.scrollY > 300);
});

render();
</script>
